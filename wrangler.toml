# Cloudflare Pages + OpenNext deployment config
name = "hr-quiz"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".open-next/assets"

[vars]
# Workaround for opennextjs/cloudflare#1232: getMiddlewareManifest() dynamic require crash
NEXT_PRIVATE_MINIMAL_MODE = "1"
